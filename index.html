<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>СКАНЕР 412</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon412.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<script src="quagga.min.js"></script>
<style>
*{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  margin:0;padding:0;
  /* fill entire screen, block all scrolling */
  height:100%;overflow:hidden;
  font-family:-apple-system,system-ui,sans-serif;background:#f0f2f5;
  /* respect iPhone notch/home bar */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

.wrap{
  width:100%;max-width:620px;margin:0 auto;
  padding:10px 12px 12px;
  /* fill viewport height minus safe areas */
  height:100%;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── Header ── */
.header{flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.header h2{
  margin:0;font-size:22px;font-weight:700;color:#1a1a1a;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;
}

/* ── Shared pill/badge ── */
.badge{
  display:inline-flex;align-items:center;
  font-size:13px;font-weight:700;color:#fff;
  background:#1a1a1a;border-radius:10px;padding:4px 12px;
  border:none;cursor:default;
}
.format-toggle{
  display:inline-flex;align-items:center;
  font-size:13px;font-weight:700;padding:4px 12px;border-radius:10px;cursor:pointer;
  border:none;background:#6c757d;color:#fff;
}
.format-toggle.active{background:#007bff;}

/* ── Camera ── */
.camera-wrap{flex-shrink:0;position:relative;margin-bottom:4px;}
#interactive.viewport{
  width:100%;height:29.4vw;min-height:137px;max-height:210px;
  overflow:hidden;position:relative;
  background:#111;border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  cursor:pointer;
}
#interactive.viewport>video,
#interactive.viewport>canvas{width:100%;height:100%;object-fit:cover;}

/* Sleep overlay */
#sleepOverlay{
  display:none;position:absolute;inset:0;border-radius:14px;
  background:rgba(0,0,0,.82);z-index:10;
  flex-direction:column;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;
}
#sleepOverlay.active{display:flex;}
#sleepOverlay .sleep-icon{font-size:32px;line-height:1;}
#sleepOverlay .sleep-text{color:#fff;font-size:14px;font-weight:600;}
#sleepOverlay .sleep-sub{color:rgba(255,255,255,.55);font-size:12px;}

/* Torch — floats over camera */
#torchBtn{
  display:none;position:absolute;top:8px;right:8px;z-index:11;
  width:38px;height:38px;border-radius:10px;border:none;
  background:rgba(0,0,0,.45);color:#fff;font-size:18px;cursor:pointer;
  align-items:center;justify-content:center;
  transition:background .2s;
}
#torchBtn.on{background:rgba(255,220,0,.8);color:#333;}

/* Timer hint */
.timer-hint{flex-shrink:0;font-size:11px;color:#adb5bd;text-align:right;margin-bottom:6px;}
.timer-hint span{color:#6c757d;font-weight:600;}

/* ── List panel: fills remaining space ── */
.list-panel{flex:1;min-height:0;position:relative;margin-bottom:8px;}

/* Badges float inside textarea top */
.list-meta{
  position:absolute;top:8px;left:10px;right:10px;z-index:1;
  display:flex;justify-content:space-between;align-items:center;
  pointer-events:none;
}
.list-meta .badge,
.list-meta .format-toggle{pointer-events:auto;}

textarea{
  display:block;width:100%;height:100%;
  padding:40px 12px 10px;border-radius:12px;border:1.5px solid #d0d4da;
  font-size:16px;line-height:1.5;resize:none;background:#fff;
  user-select:text;font-family:monospace;
}

/* ── Buttons column below textarea ── */
.actions{flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
.btn{
  display:flex;align-items:center;justify-content:center;flex-direction:row;gap:8px;
  width:100%;height:54px;border-radius:12px;border:1.5px solid #d0d4da;
  font-weight:700;font-size:14px;background:#fff;cursor:pointer;padding:0 16px;
  line-height:1.3;text-align:left;
}
.btn-icon{font-size:18px;line-height:1;}
.btn-manual{background:#fff8e1;border-color:#ffe082;color:#7c5a00;}
.btn-undo  {background:#f8f9fa;border-color:#d0d4da;color:#343a40;}
.btn-copy  {background:#d4edda;border-color:#b1dfbb;color:#155724;}
.btn-clear {background:#fff5f5;border-color:#f5c6c6;color:#c0392b;}

/* ── Manual input dialog ── */
dialog{
  position:fixed;bottom:0;left:0;right:0;top:auto;
  margin:0 auto;width:100%;max-width:620px;
  padding:0;border:none;border-radius:20px 20px 0 0;
  background:#fff;box-shadow:0 -4px 24px rgba(0,0,0,.18);
  outline:none;
  padding-bottom:env(safe-area-inset-bottom);
}
dialog::backdrop{background:rgba(0,0,0,.4);}
.dialog-inner{padding:20px 16px 24px;}
.dialog-handle{width:40px;height:4px;border-radius:2px;background:#d0d4da;margin:0 auto 16px;}
.dialog-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:14px;text-align:center;}
.dialog-input-row{display:flex;gap:8px;}
#manualInput{
  flex:1;min-width:0;font-size:22px;padding:12px 14px;
  border-radius:12px;border:1.5px solid #d0d4da;background:#f8f9fa;
  user-select:text;outline:none;transition:border-color .15s;letter-spacing:2px;
}
#manualInput:focus{border-color:#007bff;background:#fff;}
#dialogAddBtn{
  flex-shrink:0;width:56px;height:56px;border-radius:12px;border:none;
  background:#28a745;color:#fff;font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.dialog-hint{font-size:12px;color:#adb5bd;text-align:center;margin-top:10px;}
.dialog-close{
  display:block;width:100%;margin-top:12px;height:44px;
  border-radius:10px;border:1.5px solid #d0d4da;
  background:#f8f9fa;color:#495057;font-size:14px;font-weight:600;cursor:pointer;
}

.credits{flex-shrink:0;text-align:center;font-size:10px;color:#bbb;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h2>СКАНЕР 412</h2>
  </div>

  <div class="camera-wrap">
    <div id="interactive" class="viewport"></div>
    <div id="sleepOverlay">
      <div class="sleep-icon">📷</div>
      <div class="sleep-text">Камера на паузі</div>
      <div class="sleep-sub">Торкніться, щоб продовжити</div>
    </div>
    <button id="torchBtn" title="Ліхтарик">🔦</button>
  </div>

  <div class="timer-hint" id="timerHint">Автопауза через <span id="timerCountdown">30</span> с</div>

  <div class="list-panel">
    <div class="list-meta">
      <div class="badge" id="counter">0 кодів</div>
      <div id="formatToggle" class="format-toggle">Стовпчик</div>
    </div>
    <textarea id="result" readonly placeholder="Тут з'являться відскановані коди..."></textarea>
  </div>

  <div class="actions">
    <button class="btn btn-manual"  id="manualBtn"> <span class="btn-icon">✏️</span>Вручну</button>
    <button class="btn btn-undo"    id="undoBtn">   <span class="btn-icon">↩</span>Назад</button>
    <button class="btn btn-copy"    id="copyBtn">   <span class="btn-icon">📋</span>Копіювати</button>
    <button class="btn btn-clear"   id="clearAllBtn"><span class="btn-icon">🗑</span>Очистити</button>
  </div>

  <div class="credits">Created by Oleksii Zhuravko, idea Vitalii Tupchienko</div>
</div>

<!-- Manual input dialog -->
<dialog id="manualDialog">
  <div class="dialog-inner">
    <div class="dialog-handle"></div>
    <div class="dialog-title">Введіть код вручну</div>
    <div class="dialog-input-row">
      <input id="manualInput" type="tel" inputmode="numeric" placeholder="0000000" autocomplete="off">
      <button id="dialogAddBtn">➕</button>
    </div>
    <div class="dialog-hint">Цифрова клавіатура відкриється автоматично</div>
    <button class="dialog-close" id="dialogCloseBtn">Закрити</button>
  </div>
</dialog>

<audio id="beep" preload="auto"><source src="beep.mp3" type="audio/mpeg"></audio>

<script>
const STORAGE_KEY = "scanner412_codes";
const FORMAT_KEY  = "scanner412_format";
const SLEEP_AFTER = 30;

const scannedCodes    = new Set();
let isTorchOn         = false;
let useCommaSeparator = localStorage.getItem(FORMAT_KEY) === "comma";
let lastDetectedCode  = null;
let detectionCount    = 0;
let isSleeping        = false;
let sleepTimer        = null;
let countdownInterval = null;
let secondsLeft       = SLEEP_AFTER;

// ── Named handler ──────────────────────────────────────────────────────
function onDetectedHandler(data) {
  const code = data.codeResult.code;
  if (code.length < 3 || code.length > 8) return;
  if (code === lastDetectedCode) {
    detectionCount++;
  } else {
    lastDetectedCode = code;
    detectionCount = 0;
  }
  if (detectionCount >= 3) {
    processCode(code);
    detectionCount = 0;
    lastDetectedCode = null;
  }
}

// ── Quagga ─────────────────────────────────────────────────────────────
function startQuagga() 
{
  Quagga.init({
    inputStream: {
      name: "Live", type: "LiveStream",
      target: document.querySelector('#interactive'),
      constraints: {
        facingMode: "environment",
        width:  { min: 640, ideal: 1280 },
        height: { min: 480, ideal: 720 },
        aspectRatio: { ideal: 1.777 }
      },
    },
    locator: { patchSize: "medium", halfSample: true },
    decoder: { readers: ["code_128_reader", "code_39_reader"] }
  }, err => {
    if (err) return;
    Quagga.offDetected(onDetectedHandler);
    Quagga.onDetected(onDetectedHandler);
    Quagga.start();
    checkTorchSupport();
    resetSleepTimer();
  });
}

// ── Power saving ───────────────────────────────────────────────────────
function resetSleepTimer() {
  clearTimeout(sleepTimer);
  clearInterval(countdownInterval);
  secondsLeft = SLEEP_AFTER;
  updateCountdown();
  document.getElementById("timerHint").style.display = "";

  countdownInterval = setInterval(() => {
    secondsLeft--;
    updateCountdown();
    if (secondsLeft <= 0) clearInterval(countdownInterval);
  }, 1000);

  sleepTimer = setTimeout(goToSleep, SLEEP_AFTER * 1000);
}

function updateCountdown() {
  const el = document.getElementById("timerCountdown");
  if (el) el.textContent = Math.max(0, secondsLeft);
}

function goToSleep() {
  if (isSleeping) return;
  isSleeping = true;
  clearInterval(countdownInterval);
  document.getElementById("timerHint").style.display = "none";

  if (isTorchOn) {
    const track = Quagga.CameraAccess.getActiveTrack();
    if (track) track.applyConstraints({ advanced: [{ torch: false }] }).catch(() => {});
    isTorchOn = false;
    const tb = document.getElementById("torchBtn");
    tb.textContent = "🔦"; tb.classList.remove("on");
  }

  Quagga.stop();
  document.getElementById("sleepOverlay").classList.add("active");
}

function wakeUp() {
  if (!isSleeping) return;
  isSleeping = false;
  document.getElementById("sleepOverlay").classList.remove("active");
  startQuagga();
  // ДІАГНОСТИКА — прибрати після тесту
setTimeout(() => {
  const track = Quagga.CameraAccess.getActiveTrack();
  if (!track) { alert("Трек не знайдено"); return; }
  const caps = JSON.stringify(track.getCapabilities(), null, 2);
  const settings = JSON.stringify(track.getSettings(), null, 2);
  alert("CAPS:\n" + caps + "\n\nSETTINGS:\n" + settings);
}, 3000);
}

document.getElementById("interactive").addEventListener("click", () => {
  if (isSleeping) wakeUp(); else resetSleepTimer();
});
document.getElementById("sleepOverlay").addEventListener("click", wakeUp);

// ── Torch ──────────────────────────────────────────────────────────────
// Safari on iOS does not expose torch via getCapabilities(),
// but applyConstraints({advanced:[{torch}]}) may still work on some devices.
// We show the button on all non-desktop platforms and let the API decide.
function checkTorchSupport() {
  const isDesktop = !/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (isDesktop) return; // no torch on desktop browsers
  // Show immediately; if the device doesn't support it the click handler will hide it
  document.getElementById("torchBtn").style.display = "flex";
}

document.getElementById("torchBtn").onclick = async function (e) {
  e.stopPropagation();
  const track = Quagga.CameraAccess.getActiveTrack();
  if (!track) return;
  const next = !isTorchOn;
  try {
    await track.applyConstraints({ advanced: [{ torch: next }] });
    isTorchOn = next;
  } catch {
    try {
      await track.applyConstraints({ torch: next });
      isTorchOn = next;
    } catch (e2) {
      // Device truly doesn't support torch — hide button so it doesn't confuse user
      console.warn("Torch not supported, hiding button.", e2);
      this.style.display = "none";
      return;
    }
  }
  this.textContent = isTorchOn ? "💡" : "🔦";
  this.classList.toggle("on", isTorchOn);
};

// ── Manual input dialog ────────────────────────────────────────────────
const dialog   = document.getElementById("manualDialog");
const manInput = document.getElementById("manualInput");

document.getElementById("manualBtn").onclick = () => {
  manInput.value = "";
  dialog.showModal();
  // Small delay so the dialog is rendered before focusing → triggers keyboard
  setTimeout(() => manInput.focus(), 80);
};

function submitManual() {
  if (processCode(manInput.value)) {
    manInput.value = "";
    dialog.close();
  } else {
    // Shake input to signal duplicate / empty
    manInput.style.outline = "2px solid #dc3545";
    setTimeout(() => manInput.style.outline = "", 800);
  }
}

document.getElementById("dialogAddBtn").onclick   = submitManual;
document.getElementById("dialogCloseBtn").onclick = () => { dialog.close(); };

// Submit on Enter key
manInput.addEventListener("keydown", e => { if (e.key === "Enter") submitManual(); });

// Close on backdrop click
dialog.addEventListener("click", e => { if (e.target === dialog) dialog.close(); });

// ── Core logic ─────────────────────────────────────────────────────────
function processCode(code) {
  code = code.trim();
  if (!code || scannedCodes.has(code)) return false;
  scannedCodes.add(code);
  updateUI();
  resetSleepTimer();
  if ("vibrate" in navigator) navigator.vibrate(80);
  document.getElementById("beep").play().catch(() => {});
  return true;
}

// ── Format toggle ──────────────────────────────────────────────────────
const formatToggleBtn = document.getElementById("formatToggle");
formatToggleBtn.classList.toggle("active", useCommaSeparator);
formatToggleBtn.innerText = useCommaSeparator ? "Кома" : "Стовпчик";
formatToggleBtn.onclick = function () {
  useCommaSeparator = !useCommaSeparator;
  localStorage.setItem(FORMAT_KEY, useCommaSeparator ? "comma" : "newline");
  this.classList.toggle("active", useCommaSeparator);
  this.innerText = useCommaSeparator ? "Кома" : "Стовпчик";
  updateUI();
};

// ── Undo ───────────────────────────────────────────────────────────────
document.getElementById("undoBtn").onclick = () => {
  const arr = [...scannedCodes];
  if (arr.length > 0) {
    arr.pop();
    scannedCodes.clear();
    arr.forEach(v => scannedCodes.add(v));
    updateUI();
  }
};

// ── Copy ───────────────────────────────────────────────────────────────
document.getElementById("copyBtn").onclick = function () {
  const text = document.getElementById("result").value;
  if (!text) return;
  const btn = this;
  const original = btn.innerHTML;
  navigator.clipboard.writeText(text)
    .then(() => {
      btn.innerHTML = '<span class="btn-icon">✅</span>Скопійовано';
      setTimeout(() => btn.innerHTML = original, 1500);
    })
    .catch(() => {
      try {
        document.getElementById("result").select();
        document.execCommand("copy");
        btn.innerHTML = '<span class="btn-icon">✅</span>Скопійовано';
        setTimeout(() => btn.innerHTML = original, 1500);
      } catch(e) { console.error("Copy failed:", e); }
    });
};

// ── Clear all ──────────────────────────────────────────────────────────
document.getElementById("clearAllBtn").onclick = () => {
  if (confirm("Очистити весь список?")) {
    scannedCodes.clear();
    updateUI();
    isSleeping = false;
    document.getElementById("sleepOverlay").classList.remove("active");
    Quagga.stop();
    startQuagga();
  }
};

// ── UI update ──────────────────────────────────────────────────────────
function updateUI() {
  const arr = [...scannedCodes];
  document.getElementById("result").value = arr.join(useCommaSeparator ? ", " : "\n");
  const n = scannedCodes.size;
  document.getElementById("counter").textContent = n === 0 ? "0 кодів" : `${n} ${pluralUa(n)}`;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function pluralUa(n) {
  if (n % 10 === 1 && n % 100 !== 11) return "код";
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return "коди";
  return "кодів";
}

// ── Restore ────────────────────────────────────────────────────────────
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) { JSON.parse(saved).forEach(v => scannedCodes.add(v)); updateUI(); }

// ── Service Worker ─────────────────────────────────────────────────────
if ("serviceWorker" in navigator) navigator.serviceWorker.register('sw.js');

// ── Start ──────────────────────────────────────────────────────────────
startQuagga();
</script>
</body>
</html>
